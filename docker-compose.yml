
services:
  stress:
    image: curlimages/curl:latest
    container_name: financial_stress
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./scripts/stress_transactions.sh:/stress_transactions.sh:ro
    entrypoint: ["sh", "/stress_transactions.sh"]
    environment:
      API_URL: http://backend:4000
      ACCOUNT_ID: 1
      AMOUNT: 10.00
      REQUESTS: 20
      ACTION: withdraw
    profiles: ["stress"]
  db:
    image: postgres:16
    container_name: financial_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: financial_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      MIX_ENV: dev
      SECRET_KEY_BASE: "dev_key_only_change_in_prod"
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_deps:/app/deps
      - backend_build:/app/_build
    command: sh -c "mix ecto.create || true && mix ecto.migrate && mix run priv/repo/seeds.exs && mix phx.server"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build: ./frontend
    container_name: financial_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_TARGET: http://backend:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev

volumes:
  pg_data:
  backend_deps:
  backend_build:
  frontend_node_modules:
